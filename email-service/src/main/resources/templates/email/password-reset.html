<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #18181b;
    }
    .wrapper {
      max-width: 560px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header {
      background-color: #3b82f6;
      padding: 32px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
    }
    .body {
      padding: 40px;
    }
    .body p {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.6;
      color: #3f3f46;
    }
    .otp-box {
      margin: 32px 0;
      text-align: center;
    }
    .otp-code {
      display: inline-block;
      background-color: #eff6ff;
      border: 2px dashed #3b82f6;
      border-radius: 8px;
      padding: 16px 40px;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 8px;
      color: #1d4ed8;
    }
    .expiry-note {
      font-size: 13px;
      color: #71717a;
      text-align: center;
      margin-top: 8px;
    }
    .warning {
      background-color: #fef9c3;
      border-left: 4px solid #eab308;
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      color: #713f12;
      margin-top: 24px;
    }
    .footer {
      padding: 24px 40px;
      background-color: #f4f4f5;
      text-align: center;
      font-size: 12px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1 th:text="${appName}">Cicipin</h1>
    </div>
    <div class="body">
      <p>Hi <strong th:text="${name}">there</strong>,</p>
      <p>We received a request to reset your password. Use the code below to proceed. This code is valid for <strong th:text="${expiryMinutes}">15</strong> minutes.</p>

      <div class="otp-box">
        <div class="otp-code" th:text="${resetCode}">000000</div>
        <p class="expiry-note">Expires in <span th:text="${expiryMinutes}">15</span> minutes</p>
      </div>

      <div class="warning">
        If you did not request a password reset, please ignore this email. Your password will not be changed.
      </div>
    </div>
    <div class="footer">
      &copy; <span th:text="${appName}">Cicipin</span>. All rights reserved.
    </div>
  </div>
</body>
</html>
