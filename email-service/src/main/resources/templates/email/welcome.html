<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #18181b;
    }
    .wrapper {
      max-width: 560px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header {
      background-color: #f97316;
      padding: 32px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
    }
    .body {
      padding: 40px;
    }
    .body p {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.6;
      color: #3f3f46;
    }
    .highlight {
      color: #f97316;
      font-weight: 700;
    }
    .footer {
      padding: 24px 40px;
      background-color: #f4f4f5;
      text-align: center;
      font-size: 12px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Welcome to <span th:text="${appName}">Cicipin</span></h1>
    </div>
    <div class="body">
      <p>Hi <strong th:text="${name}">there</strong>,</p>
      <p>
        Your account has been verified and is ready to use.
        Welcome to <span class="highlight" th:text="${appName}">Cicipin</span> — we're glad to have you on board!
      </p>
      <p>You can now log in and start exploring.</p>
      <p>If you have any questions, feel free to reach out to our support team.</p>
    </div>
    <div class="footer">
      &copy; <span th:text="${appName}">Cicipin</span>. All rights reserved.
    </div>
  </div>
</body>
</html>
