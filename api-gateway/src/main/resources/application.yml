server:
  port: ${API_GATEWAY_CONTAINER_PORT}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://cicipin-user-service:${USER_SERVICE_CONTAINER_PORT}
              predicates:
                - Path=/user/**
              filters:
                - StripPrefix=0
            - id: user-service-health
              uri: http://cicipin-user-service:${USER_SERVICE_CONTAINER_PORT}
              predicates:
                - Path=/user-service-health
              filters:
                - StripPrefix=0
            - id: email-service-health
              uri: http://cicipin-email-service:${EMAIL_SERVICE_CONTAINER_PORT}
              predicates:
                - Path=/email-service-health
              filters:
                - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
